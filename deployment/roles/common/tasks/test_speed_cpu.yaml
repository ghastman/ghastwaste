- name: Ensure benchmark dependencies are installed (Debian/Ubuntu)
  ansible.builtin.package:
    name:
      - stress-ng
      - sysstat
    state: present
  become: true    
  when: ansible_os_family in ["Debian", "RedHat"]

- name: Capture idle CPU utilization baseline (10 seconds)
  ansible.builtin.command: mpstat -P ALL 1 10
  register: mpstat_baseline
  changed_when: false

- name: Run stress-ng matrix CPU benchmark for 10 seconds
  ansible.builtin.command: stress-ng --matrix 0 --metrics-brief -t 10s
  register: stress_ng_output
  changed_when: false

- name: Parse bogo-ops per second from output
  ansible.builtin.set_fact:
    # Extracts the final numeric column value from the 'matrix' results line
    bogo_ops_sec: >-
      {% set text = (stress_ng_output.stdout | default('')) + '\n' + (stress_ng_output.stderr | default('')) %}
      {% set matrix_line = (text | split('\n') | select('search','matrix\\s+\\d') | list) | first | default('') %}
      {% set nums = matrix_line | regex_findall('([0-9]+(?:\\.[0-9]+)?)') | default([]) %}
      {{ nums[-1] if nums | length >= 1 else '0' }}

- name: Display benchmark results summary
  ansible.builtin.debug:
    msg: 
      - "Host: {{ inventory_hostname }}"
      - "CPU Cores Detected: {{ ansible_processor_vcpus }}"
      - "Matrix Benchmark Score: {{ bogo_ops_sec }} bogo-ops/sec"